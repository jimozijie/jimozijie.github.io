  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
  <!-- 默认主题 -->

  <!-- 封面页自定义样式 -->
  <style>
    /* 封面背景渐变 - 更淡的蓝 + 更明显的渐变 */
    .cover.show {
      background: linear-gradient(135deg, #d6eef8 0%, #4a9edb 50%, #1a6fb5 100%) !important;
    }

    /* 头像圆形 + 边框 */
    .cover.show .cover-main > img {
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      width: 140px;
      height: 140px;
      object-fit: cover;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }
    .cover.show .cover-main > img:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }

    /* 标题样式 */
    .cover.show .cover-main > h1 {
      color: #fff !important;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }
    .cover.show .cover-main > h1 small {
      color: rgba(255, 255, 255, 0.75) !important;
      font-weight: 400;
    }

    /* 副标题 / 引言 */
    .cover.show .cover-main > blockquote {
      color: rgba(255, 255, 255, 0.9) !important;
      border-left-color: rgba(255, 255, 255, 0.5) !important;
      font-style: italic;
      font-size: 1.1em;
    }

    /* 列表项 */
    .cover.show .cover-main > ul {
      color: rgba(255, 255, 255, 0.9) !important;
    }
    .cover.show .cover-main > ul li {
      font-size: 1.05em;
      margin: 6px 0;
    }

    /* 徽章容器 */
    .cover.show .cover-main p {
      margin: 20px 0 !important;
    }

    /* CTA 按钮 */
    .cover.show .cover-main > p:last-child a {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.6);
      color: #fff !important;
      border-radius: 30px;
      padding: 10px 36px;
      font-size: 1.1em;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    .cover.show .cover-main > p:last-child a:hover {
      background: rgba(255, 255, 255, 0.35);
      border-color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    /* 入场动画 */
    .cover.show .cover-main > * {
      animation: coverFadeIn 0.6s ease forwards;
      opacity: 0;
    }
    .cover.show .cover-main > img { animation-delay: 0.1s; }
    .cover.show .cover-main > h1 { animation-delay: 0.3s; }
    .cover.show .cover-main > blockquote { animation-delay: 0.5s; }
    .cover.show .cover-main > p { animation-delay: 0.7s; }
    .cover.show .cover-main > ul { animation-delay: 0.7s; }
    .cover.show .cover-main > p:last-child { animation-delay: 0.9s; }

    @keyframes coverFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 个人简介 - 时间轴 */
    .timeline-section { margin: 30px 0; }
    .timeline { position: relative; padding: 10px 0; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 18px;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, #74b9ff, #0984e3);
      border-radius: 2px;
    }
    .timeline-item {
      position: relative;
      margin: 20px 0;
      padding-left: 50px;
      opacity: 0;
      transform: translateX(-20px);
      animation: slideIn 0.5s ease forwards;
    }
    .timeline-item:nth-child(1) { animation-delay: 0.1s; }
    .timeline-item:nth-child(2) { animation-delay: 0.25s; }
    .timeline-item:nth-child(3) { animation-delay: 0.4s; }
    .timeline-item:nth-child(4) { animation-delay: 0.55s; }
    .timeline-item:nth-child(5) { animation-delay: 0.7s; }
    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }
    .timeline-dot {
      position: absolute;
      left: 12px;
      top: 6px;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #0984e3;
      border: 3px solid #fff;
      box-shadow: 0 0 0 3px #74b9ff;
    }
    .timeline-content {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px 18px;
      border-left: 4px solid #0984e3;
      transition: box-shadow 0.3s, transform 0.3s;
    }
    .timeline-content:hover {
      box-shadow: 0 4px 15px rgba(9,132,227,0.2);
      transform: translateX(4px);
    }
    .timeline-date {
      display: inline-block;
      background: linear-gradient(135deg, #74b9ff, #0984e3);
      color: #fff;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 12px;
      margin-bottom: 6px;
    }
    .timeline-content h4 { margin: 4px 0; color: #2d3436; }
    .timeline-content p { margin: 2px 0 0; color: #636e72; font-size: 14px; }

    /* 个人简介 - 雷达图 */
    .radar-section { margin: 30px 0; }
    .radar-section h3 { text-align: center; }
  </style>
</head>

<body>

<!-- Docsify Giscus 评论插件 -->
<script>
  var giscusConfig = {
    repo: 'jimozijie/jimozijie.github.io',
    repoId: 'R_kgDOOtMfxg',
    category: 'Announcements',
    categoryId: 'DIC_kwDOOtMfxs4DAC15',
    mapping: 'pathname',
    strict: '0',
    reactionsEnabled: '1',
    emitMetadata: '0',
    inputPosition: 'bottom',
    theme: 'preferred_color_scheme',
    lang: 'zh-CN',
  };

  var giscusScriptLoaded = false;

  function loadGiscus() {
    // 移除旧的 giscus 容器（如果有）
    var old = document.getElementById('giscus-container');
    if (old) old.remove();

    var content = document.querySelector('.markdown-section');
    if (!content) return;

    // 创建新容器
    var container = document.createElement('div');
    container.id = 'giscus-container';
    content.appendChild(container);

    if (!giscusScriptLoaded) {
      // 首次加载：插入 giscus script
      var script = document.createElement('script');
      script.src = 'https://giscus.app/client.js';
      script.setAttribute('data-repo', giscusConfig.repo);
      script.setAttribute('data-repo-id', giscusConfig.repoId);
      script.setAttribute('data-category', giscusConfig.category);
      script.setAttribute('data-category-id', giscusConfig.categoryId);
      script.setAttribute('data-mapping', giscusConfig.mapping);
      script.setAttribute('data-strict', giscusConfig.strict);
      script.setAttribute('data-reactions-enabled', giscusConfig.reactionsEnabled);
      script.setAttribute('data-emit-metadata', giscusConfig.emitMetadata);
      script.setAttribute('data-input-position', giscusConfig.inputPosition);
      script.setAttribute('data-theme', giscusConfig.theme);
      script.setAttribute('data-lang', giscusConfig.lang);
      script.setAttribute('crossorigin', 'anonymous');
      script.async = true;
      container.appendChild(script);
      giscusScriptLoaded = true;
    } else {
      // 后续路由切换：把 giscus 移入新容器，并通知更新页面
      var giscus = document.querySelector('.giscus');
      if (giscus) {
        container.appendChild(giscus);
      }
      // 通过 postMessage 切换到新页面的评论
      setTimeout(function () {
        var giscusFrame = document.querySelector('iframe.giscus-frame');
        if (giscusFrame) {
          giscusFrame.contentWindow.postMessage({
            giscus: {
              setConfig: {
                term: location.pathname,
              }
            }
          }, 'https://giscus.app');
        }
      }, 300);
    }
  }

  // 不蒜子访客统计：每次路由切换后插入 footer 并重新加载脚本
  function loadBusuanzi() {
    var section = document.querySelector('.markdown-section');
    if (!section) return;

    // 移除旧的 footer
    var oldFooter = document.getElementById('busuanzi-footer');
    if (oldFooter) oldFooter.remove();

    // 插入新的 footer
    var footer = document.createElement('div');
    footer.id = 'busuanzi-footer';
    footer.innerHTML = '<hr/><footer style="text-align:center;font-size:13px;color:#999;">' +
      '<span id="busuanzi_container_site_pv">本站总访问量 <span id="busuanzi_value_site_pv"></span> 次</span>' +
      ' | ' +
      '<span id="busuanzi_container_site_uv">本站总访客数 <span id="busuanzi_value_site_uv"></span> 人</span>' +
      ' | ' +
      '<span id="busuanzi_container_page_pv">本文阅读量 <span id="busuanzi_value_page_pv"></span> 次</span>' +
      '</footer>';
    section.appendChild(footer);

    // 移除旧的不蒜子脚本，重新加载
    var oldScript = document.getElementById('busuanzi-script');
    if (oldScript) oldScript.remove();
    var script = document.createElement('script');
    script.id = 'busuanzi-script';
    script.async = true;
    script.src = '//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js';
    document.body.appendChild(script);
  }

  // Docsify 插件：每次路由完成后加载评论 + 雷达图 + 不蒜子
  window.$docsify.plugins = (window.$docsify.plugins || []).concat(function (hook) {
    hook.doneEach(function () {
      loadGiscus();
      initRadarChart();
      loadBusuanzi();
    });
  });
</script>

<!-- ECharts 雷达图 -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>
  var radarChart = null;
  function initRadarChart() {
    var dom = document.getElementById('radar-chart');
    if (!dom || dom.offsetWidth === 0) return;

    if (radarChart) {
      radarChart.dispose();
    }
    radarChart = echarts.init(dom);
    radarChart.setOption({
      tooltip: { trigger: 'item' },
      radar: {
        indicator: [
          { name: 'Python', max: 100 },
          { name: '深度学习/PyTorch', max: 100 },
          { name: '计算机视觉/OpenCV', max: 100 },
          { name: '目标检测/YOLO', max: 100 },
          { name: 'Java/SpringBoot', max: 100 },
          { name: '模型部署/TensorRT', max: 100 },
          { name: '数据分析/可视化', max: 100 },
          { name: 'Web后端开发', max: 100 }
        ],
        shape: 'circle',
        splitNumber: 5,
        axisName: { color: '#555', fontSize: 12 },
        splitArea: { areaStyle: { color: ['rgba(116,185,255,0.05)', 'rgba(116,185,255,0.1)'] } }
      },
      series: [{
        type: 'radar',
        data: [{
          value: [92, 88, 85, 90, 72, 80, 78, 75],
          name: '技能掌握度',
          areaStyle: { color: 'rgba(9,132,227,0.25)' },
          lineStyle: { color: '#0984e3', width: 2 },
          itemStyle: { color: '#0984e3' }
        }]
      }]
    });
    window.addEventListener('resize', function () { radarChart && radarChart.resize(); });
  }
</script>
