<!DOCTYPE html>
<html lang="en">

<head>

  <meta name="description" content="Description">

        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <!-- 设置浏览器图标 -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
  <!-- 默认主题 -->

</head>

<body>
<!-- 定义加载时候的动作 -->
<div id="app">加载中...</div>
<script>
  window.$docsify = {
    // 项目名称
    name: '墨子杰编程',
    // 仓库地址，点击右上角的Github章鱼猫头像会跳转到此地址
    repo: 'https://github.com/jimozijie/jimozijie.github.io',
    // 侧边栏支持，默认加载的是项目根目录下的_sidebar.md文件
    loadSidebar: true,
    // 导航栏支持，默认加载的是项目根目录下的_navbar.md文件
    loadNavbar: true,
    // 封面支持，默认加载的是项目根目录下的_coverpage.md文件
    coverpage: true,
    // 最大支持渲染的标题层级
    maxLevel: 4,
    // 自定义侧边栏后默认不会再生成目录，设置生成目录的最大层级（建议配置为2-4）
    subMaxLevel: 2,
    // 小屏设备下合并导航栏到侧边栏
    mergeNavbar: true,
    /*搜索相关设置*/
    search: {
      maxAge: 86400000,// 过期时间，单位毫秒，默认一天
      paths: 'auto',// 注意：仅适用于 paths: 'auto' 模式
      placeholder: '输入内容检索',
      noData: '未检索到结果',
      depth: 4,
      hideOtherSidebarContent: false, // 是否隐藏其他侧边栏内容
      namespace: '墨子杰编程',
    },
  }
</script>
<!-- docsify的js依赖 -->

<!-- Docsify Giscus 评论插件 -->
<script>
  var giscusConfig = {
    repo: 'jimozijie/jimozijie.github.io',
    repoId: 'R_kgDOOtMfxg',
    category: 'Announcements',
    categoryId: 'DIC_kwDOOtMfxs4DAC15',
    mapping: 'pathname',
    strict: '0',
    reactionsEnabled: '1',
    emitMetadata: '0',
    inputPosition: 'bottom',
    theme: 'preferred_color_scheme',
    lang: 'zh-CN',
  };

  var giscusScriptLoaded = false;

  function loadGiscus() {
    // 移除旧的 giscus 容器（如果有）
    var old = document.getElementById('giscus-container');
    if (old) old.remove();

    var content = document.querySelector('.markdown-section');
    if (!content) return;

    // 创建新容器
    var container = document.createElement('div');
    container.id = 'giscus-container';
    content.appendChild(container);

    if (!giscusScriptLoaded) {
      // 首次加载：插入 giscus script
      var script = document.createElement('script');
      script.src = 'https://giscus.app/client.js';
      script.setAttribute('data-repo', giscusConfig.repo);
      script.setAttribute('data-repo-id', giscusConfig.repoId);
      script.setAttribute('data-category', giscusConfig.category);
      script.setAttribute('data-category-id', giscusConfig.categoryId);
      script.setAttribute('data-mapping', giscusConfig.mapping);
      script.setAttribute('data-strict', giscusConfig.strict);
      script.setAttribute('data-reactions-enabled', giscusConfig.reactionsEnabled);
      script.setAttribute('data-emit-metadata', giscusConfig.emitMetadata);
      script.setAttribute('data-input-position', giscusConfig.inputPosition);
      script.setAttribute('data-theme', giscusConfig.theme);
      script.setAttribute('data-lang', giscusConfig.lang);
      script.setAttribute('crossorigin', 'anonymous');
      script.async = true;
      container.appendChild(script);
      giscusScriptLoaded = true;
    } else {
      // 后续路由切换：把 giscus 移入新容器，并通知更新页面
      var giscus = document.querySelector('.giscus');
      if (giscus) {
        container.appendChild(giscus);
      }
      // 通过 postMessage 切换到新页面的评论
      setTimeout(function () {
        var giscusFrame = document.querySelector('iframe.giscus-frame');
        if (giscusFrame) {
          giscusFrame.contentWindow.postMessage({
            giscus: {
              setConfig: {
                term: location.pathname,
              }
            }
          }, 'https://giscus.app');
        }
      }, 300);
    }
  }

  // Docsify 插件：每次路由完成后加载评论
  window.$docsify.plugins = (window.$docsify.plugins || []).concat(function (hook) {
    hook.doneEach(function () {
      loadGiscus();
    });
  });
</script>
</body>

</html>
