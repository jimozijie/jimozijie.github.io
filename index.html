  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <!-- 设置浏览器图标 -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
  <!-- 默认主题 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <!-- 封面页自定义样式 -->
  <style>
    /* 封面背景渐变 - 更淡的蓝 + 更明显的渐变（用伪元素实现，让 canvas 粒子在渐变之上） */
    .cover.show {
      background: transparent !important;
    }
    .cover.show::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #d6eef8 0%, #4a9edb 50%, #1a6fb5 100%);
      z-index: 0;
    }

    /* 头像圆形 + 边框 */
    .cover.show .cover-main > img {
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      width: 140px;
      height: 140px;
      object-fit: cover;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }
    .cover.show .cover-main > img:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }

    /* 标题样式 */
    .cover.show .cover-main > h1 {
      color: #fff !important;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }
    .cover.show .cover-main > h1 small {
      color: rgba(255, 255, 255, 0.75) !important;
      font-weight: 400;
    }

    /* 副标题 / 引言 */
    .cover.show .cover-main > blockquote {
      color: rgba(255, 255, 255, 0.9) !important;
      border-left-color: rgba(255, 255, 255, 0.5) !important;
      font-style: italic;
      font-size: 1.1em;
    }

    /* 列表项 */
    .cover.show .cover-main > ul {
      color: rgba(255, 255, 255, 0.9) !important;
    }
    .cover.show .cover-main > ul li {
      font-size: 1.05em;
      margin: 6px 0;
    }

    /* 徽章容器 */
    .cover.show .cover-main p {
      margin: 20px 0 !important;
    }

    /* CTA 按钮 */
    .cover.show .cover-main > p:last-child a {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.6);
      color: #fff !important;
      border-radius: 30px;
      padding: 10px 36px;
      font-size: 1.1em;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    .cover.show .cover-main > p:last-child a:hover {
      background: rgba(255, 255, 255, 0.35);
      border-color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    /* 入场动画 */
    .cover.show .cover-main > * {
      animation: coverFadeIn 0.6s ease forwards;
      opacity: 0;
    }
    .cover.show .cover-main > img { animation-delay: 0.1s; }
    .cover.show .cover-main > h1 { animation-delay: 0.3s; }
    .cover.show .cover-main > blockquote { animation-delay: 0.5s; }
    .cover.show .cover-main > p { animation-delay: 0.7s; }
    .cover.show .cover-main > ul { animation-delay: 0.7s; }
    .cover.show .cover-main > p:last-child { animation-delay: 0.9s; }

    @keyframes coverFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 个人简介 - 时间轴 */
    .timeline-section { margin: 30px 0; }
    .timeline { position: relative; padding: 10px 0; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 18px;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, #74b9ff, #0984e3);
      border-radius: 2px;
    }
    .timeline-item {
      position: relative;
      margin: 20px 0;
      padding-left: 50px;
      opacity: 0;
      transform: translateX(-20px);
      animation: slideIn 0.5s ease forwards;
    }
    .timeline-item:nth-child(1) { animation-delay: 0.1s; }
    .timeline-item:nth-child(2) { animation-delay: 0.25s; }
    .timeline-item:nth-child(3) { animation-delay: 0.4s; }
    .timeline-item:nth-child(4) { animation-delay: 0.55s; }
    .timeline-item:nth-child(5) { animation-delay: 0.7s; }
    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }
    .timeline-dot {
      position: absolute;
      left: 12px;
      top: 6px;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #0984e3;
      border: 3px solid #fff;
      box-shadow: 0 0 0 3px #74b9ff;
    }
    .timeline-content {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px 18px;
      border-left: 4px solid #0984e3;
      transition: box-shadow 0.3s, transform 0.3s;
    }
    .timeline-content:hover {
      box-shadow: 0 4px 15px rgba(9,132,227,0.2);
      transform: translateX(4px);
    }
    .timeline-date {
      display: inline-block;
      background: linear-gradient(135deg, #74b9ff, #0984e3);
      color: #fff;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 12px;
      margin-bottom: 6px;
    }
    .timeline-content h4 { margin: 4px 0; color: #2d3436; }
    .timeline-content p { margin: 2px 0 0; color: #636e72; font-size: 14px; }

    /* 个人简介 - 雷达图 */
    .radar-section { margin: 30px 0; }
    .radar-section h3 { text-align: center; }

    /* ===== 封面页背景粒子 canvas ===== */
    .cover.show {
      position: relative;
      z-index: 1;
    }
    #cover-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .cover.show .cover-main {
      position: relative;
      z-index: 2;
    }

    /* ===== 右侧悬浮工具栏 ===== */
    #floating-toolbar {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 9997;
      opacity: 0;
      transition: opacity 0.5s;
    }
    #floating-toolbar.visible {
      opacity: 1;
    }
    .ft-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 17px;
      color: #4a9edb;
      transition: all 0.25s ease;
      position: relative;
    }
    .ft-btn:hover {
      background: #4a9edb;
      color: #fff;
      transform: scale(1.12);
      box-shadow: 0 5px 18px rgba(74,158,219,0.35);
    }
    .ft-btn[title]:hover::after {
      content: attr(title);
      position: absolute;
      right: 52px;
      white-space: nowrap;
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
    }

    /* ===== 封面页数据看板 ===== */
    #cover-stats {
      position: fixed;
      bottom: 28px;
      left: 28px;
      display: flex;
      gap: 14px;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.8s 1s;
    }
    #cover-stats.visible { opacity: 1; }
    .stat-card {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      padding: 10px 18px;
      text-align: center;
      color: #fff;
      min-width: 86px;
    }
    .stat-card .stat-num {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
    }
    .stat-card .stat-label {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 2px;
    }

    /* 笔记页工具栏样式适配 */
    body:not(.cover-page) #floating-toolbar .ft-btn {
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 3px 12px rgba(0,0,0,0.12);
    }
  </style>
</head>

<script>
  var giscusConfig = {
    repo: 'jimozijie/jimozijie.github.io',
    repoId: 'R_kgDOOtMfxg',
    category: 'Announcements',
    categoryId: 'DIC_kwDOOtMfxs4DAC15',
    mapping: 'pathname',
    strict: '0',
    reactionsEnabled: '1',
    emitMetadata: '0',
    inputPosition: 'bottom',
    theme: 'preferred_color_scheme',
    lang: 'zh-CN',
  };

  var giscusScriptLoaded = false;

  function loadGiscus() {
    // 把 giscus 容器挂在固定的 .content 上，避免 SPA 路由切换时 iframe 被重建导致 ERR_ABORTED
    var content = document.querySelector('.content');
    if (!content) return;

    var container = document.getElementById('giscus-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'giscus-container';
      container.style.marginTop = '40px';
      content.appendChild(container);
    }

    if (!giscusScriptLoaded) {
      // 首次加载：插入 giscus script
      var script = document.createElement('script');
      script.src = 'https://giscus.app/client.js';
      script.setAttribute('data-repo', giscusConfig.repo);
      script.setAttribute('data-repo-id', giscusConfig.repoId);
      script.setAttribute('data-category', giscusConfig.category);
      script.setAttribute('data-category-id', giscusConfig.categoryId);
      script.setAttribute('data-mapping', giscusConfig.mapping);
      script.setAttribute('data-strict', giscusConfig.strict);
      script.setAttribute('data-reactions-enabled', giscusConfig.reactionsEnabled);
      script.setAttribute('data-emit-metadata', giscusConfig.emitMetadata);
      script.setAttribute('data-input-position', giscusConfig.inputPosition);
      script.setAttribute('data-theme', giscusConfig.theme);
      script.setAttribute('data-lang', giscusConfig.lang);
      script.setAttribute('crossorigin', 'anonymous');
      script.async = true;
      container.appendChild(script);
      giscusScriptLoaded = true;
    }

    // 通过 postMessage 切换到当前页面的评论
    setTimeout(function () {
      var giscusFrame = document.querySelector('iframe.giscus-frame');
      if (giscusFrame && giscusFrame.contentWindow) {
        giscusFrame.contentWindow.postMessage({
          giscus: {
            setConfig: {
              term: location.pathname,
            }
          }
        }, 'https://giscus.app');
      }
    }, 300);
  }

  // 不蒜子访客统计：只在首次加载脚本，把 footer 挂在固定 .content 上避免重建
  var busuanziLoaded = false;
  function loadBusuanzi() {
    var content = document.querySelector('.content');
    if (!content) return;

    var footer = document.getElementById('busuanzi-footer');
    if (!footer) {
      footer = document.createElement('div');
      footer.id = 'busuanzi-footer';
      footer.innerHTML = '<hr/><footer style="text-align:center;font-size:13px;color:#999;">' +
        '<span id="busuanzi_container_site_pv">本站总访问量 <span id="busuanzi_value_site_pv"></span> 次</span>' +
        ' | ' +
        '<span id="busuanzi_container_site_uv">本站总访客数 <span id="busuanzi_value_site_uv"></span> 人</span>' +
        '</footer>';
      content.appendChild(footer);
    }

    // 首次加载不蒜子脚本；之后复用，不再重复创建（避免 ERR_ABORTED）
    if (!busuanziLoaded) {
      busuanziLoaded = true;
      var script = document.createElement('script');
      script.id = 'busuanzi-script';
      script.async = true;
      script.src = '//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js';
      document.body.appendChild(script);
    }
  }

  // Docsify 插件：每次路由完成后加载评论 + 雷达图 + 不蒜子
  window.$docsify.plugins = (window.$docsify.plugins || []).concat(function (hook) {
    hook.doneEach(function () {
      loadGiscus();
      initRadarChart();
      loadBusuanzi();
    });
  });
</script>

<!-- ===== 封面背景粒子动画 ===== -->
<script>
  (function () {
    var canvas = document.getElementById('cover-particles');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var particles = [];
    var maxParticles = 60;
    var connectionDist = 120;
    var mouse = { x: null, y: null };

    function moveCanvasIntoCover() {
      var cover = document.querySelector('.cover.show');
      if (cover && canvas.parentNode !== cover) {
        cover.insertBefore(canvas, cover.firstChild);
      }
    }

    function resize() {
      var cover = canvas.parentElement;
      if (cover && cover.classList.contains('cover')) {
        canvas.width = cover.offsetWidth;
        canvas.height = cover.offsetHeight;
      } else {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
    }

    // 初始化和路由变化时都把 canvas 移入 cover
    moveCanvasIntoCover();
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(function (hook) {
      hook.doneEach(moveCanvasIntoCover);
    });
    window.addEventListener('resize', resize);
    resize();

    window.addEventListener('mousemove', function (e) {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });
    window.addEventListener('mouseleave', function () {
      mouse.x = null;
      mouse.y = null;
    });

    for (var i = 0; i < maxParticles; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.6,
        vy: (Math.random() - 0.5) * 0.6,
        r: Math.random() * 2 + 1.5
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fill();

        // 鼠标附近粒子高亮
        if (mouse.x !== null) {
          var dMouse = Math.hypot(p.x - mouse.x, p.y - mouse.y);
          if (dMouse < 150) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.strokeStyle = 'rgba(255,255,255,' + (0.25 * (1 - dMouse / 150)) + ')';
            ctx.stroke();
          }
        }

        for (var j = i + 1; j < particles.length; j++) {
          var q = particles[j];
          var d = Math.hypot(p.x - q.x, p.y - q.y);
          if (d < connectionDist) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.strokeStyle = 'rgba(255,255,255,' + (0.2 * (1 - d / connectionDist)) + ')';
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>

<!-- ===== 右侧悬浮工具栏 + 数据看板逻辑 ===== -->
<script>
  (function () {
    var toolbar = document.getElementById('floating-toolbar');
    var coverStats = document.getElementById('cover-stats');

    // 所有真实笔记路径（从 _sidebar.md 提取）
    var notes = [
      { path: 'personal_profile/personal_profile/personal_profile.md', hash: '#/personal_profile/personal_profile/personal_profile' },
      { path: 'mozijie_notebook/Python_Work_Accumulation/1.python工作积累.md', hash: '#/mozijie_notebook/Python_Work_Accumulation/1.python工作积累' },
      { path: 'mozijie_notebook/Java_Work_Accumulation/2.java工作积累.md', hash: '#/mozijie_notebook/Java_Work_Accumulation/2.java工作积累' },
      { path: 'master_studies/计算机视觉-深度学习-pytorch学习路线/computer_vision_learning_path.md', hash: '#/master_studies/计算机视觉-深度学习-pytorch学习路线/computer_vision_learning_path' },
      { path: 'master_studies/实用的科研插件/practical_research_plugin.md', hash: '#/master_studies/实用的科研插件/practical_research_plugin' },
      { path: 'computer_vision_notebook/OpenCV-Python-Tutorial/mozijie_notebook.md', hash: '#/computer_vision_notebook/OpenCV-Python-Tutorial/mozijie_notebook' },
      { path: 'computer_vision_notebook/PyTorch_Deep_Learning_Practice（By_LiuEr）/mozijie_notebook.md', hash: '#/computer_vision_notebook/PyTorch_Deep_Learning_Practice（By_LiuEr）/mozijie_notebook' },
      { path: 'computer_vision_notebook/xiaotudui_Pytorch_Tutorial/online_notes.md', hash: '#/computer_vision_notebook/xiaotudui_Pytorch_Tutorial/online_notes' },
      { path: 'computer_vision_notebook/Pytorch_Practical_Tutorial_v2_notes/mozijiie_notebook.md', hash: '#/computer_vision_notebook/Pytorch_Practical_Tutorial_v2_notes/mozijiie_notebook' },
      { path: 'java_notebook/Java_foundation_1/java_foundation_1.md', hash: '#/java_notebook/Java_foundation_1/java_foundation_1' },
      { path: 'java_notebook/苍穹外卖/mozijie_notebook.md', hash: '#/java_notebook/苍穹外卖/mozijie_notebook' }
    ];

    function updateToolbarVisibility() {
      var cover = document.querySelector('.cover.show');
      if (cover) {
        document.body.classList.add('cover-page');
        toolbar.classList.add('visible');
        coverStats && coverStats.classList.add('visible');
      } else {
        document.body.classList.remove('cover-page');
        toolbar.classList.add('visible');      // 笔记页也显示工具栏
        coverStats && coverStats.classList.remove('visible');
      }
    }

    // Docsify 路由变化时更新
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(function (hook) {
      hook.doneEach(updateToolbarVisibility);
    });

    // 字体大小切换
    var fontBtn = document.getElementById('ft-font');
    var fontSizes = [14, 15, 16, 17, 18];
    var fontIndex = 2;
    fontBtn.addEventListener('click', function () {
      fontIndex = (fontIndex + 1) % fontSizes.length;
      document.documentElement.style.fontSize = fontSizes[fontIndex] + 'px';
    });

    // 随机笔记
    document.getElementById('ft-random').addEventListener('click', function () {
      var item = notes[Math.floor(Math.random() * notes.length)];
      window.location.hash = item.hash;
    });

    // 回到顶部
    document.getElementById('ft-top').addEventListener('click', function () {
      var content = document.querySelector('.content');
      if (content) content.scrollTo({ top: 0, behavior: 'smooth' });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // 封面数据看板：笔记数量 + 运行天数
    if (coverStats) {
      animateNum('stat-notes', notes.length);

      // 运行天数：从 2025-05-20 开始算
      var start = new Date('2025-05-20');
      var days = Math.floor((Date.now() - start.getTime()) / (1000 * 60 * 60 * 24));
      animateNum('stat-days', days);

      // 总字数：异步 fetch 所有笔记文件统计真实字数
      countWordsReal().then(function (count) {
        animateNum('stat-words', count, true);
      });
    }

    async function countWordsReal() {
      var total = 0;
      for (var i = 0; i < notes.length; i++) {
        try {
          var res = await fetch(notes[i].path);
          if (!res.ok) continue;
          var text = await res.text();
          // 移除代码块、行内代码、图片、链接、HTML 标签
          text = text.replace(/```[\s\S]*?```/g, ' ');
          text = text.replace(/`[^`]+`/g, ' ');
          text = text.replace(/!\[[\s\S]*?\]\([\s\S]*?\)/g, ' ');
          text = text.replace(/\[[\s\S]*?\]\([\s\S]*?\)/g, ' ');
          text = text.replace(/<[^>]+>/g, ' ');
          // 中文字符 + 英文单词
          var cn = text.match(/[\u4e00-\u9fa5]/g) || [];
          var en = text.match(/[a-zA-Z0-9_]+/g) || [];
          total += cn.length + en.length;
        } catch (e) {
          // 忽略错误
        }
      }
      return total;
    }

    function animateNum(id, target, isK) {
      var el = document.getElementById(id);
      if (!el) return;
      var duration = 1500;
      var startTime = null;
      function step(t) {
        if (!startTime) startTime = t;
        var p = Math.min((t - startTime) / duration, 1);
        var val = Math.floor(target * (1 - Math.pow(1 - p, 3)));
        el.textContent = isK ? (val / 1000).toFixed(1) + 'k' : val;
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // 初始检查
    setTimeout(updateToolbarVisibility, 500);
  })();
</script>
